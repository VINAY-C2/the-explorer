<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>The Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/*──────────────────────────────────────────────────
  DESIGN: Dark editorial luxury — deep navy/obsidian
  base, champagne gold accents, Cormorant Garamond
  for display, Outfit for UI. Inspired by premium
  newspapers and high-end search interfaces.
──────────────────────────────────────────────────*/
:root{
  --bg:        #0b0d14;
  --bg2:       #111520;
  --bg3:       #181d2e;
  --surface:   #1c2235;
  --surface2:  #232840;
  --border:    rgba(255,255,255,0.07);
  --border2:   rgba(255,255,255,0.12);
  --text:      #e8e4d8;
  --text2:     #9fa6be;
  --text3:     #5a6180;
  --gold:      #c8a96e;
  --gold2:     #e8c98a;
  --gold-dim:  rgba(200,169,110,0.15);
  --link:      #8ab4e8;
  --link-vis:  #a88ae8;
  --green:     #5cbb8c;
  --red:       #e86a5c;
  --radius:    10px;
  --font-serif:'Cormorant Garamond',Georgia,serif;
  --font-ui:   'Outfit',sans-serif;
  --font-mono: 'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:var(--font-ui);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}

/* ── NOISE OVERLAY ── */
body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;opacity:0.4;
}

/* ══════════════════════════════════
   HOME PAGE
══════════════════════════════════ */
#page-home{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:100vh;padding:2rem;
  position:relative;
}

/* Radial glow behind logo */
#page-home::after{
  content:'';position:absolute;
  width:600px;height:600px;
  background:radial-gradient(ellipse, rgba(200,169,110,0.07) 0%, transparent 70%);
  top:50%;left:50%;transform:translate(-50%,-60%);
  pointer-events:none;
}

.home-logo-wrap{
  text-align:center;
  margin-bottom:3rem;
  animation:rise 0.9s cubic-bezier(.16,1,.3,1) both;
}
.home-logo{
  font-family:var(--font-serif);
  font-weight:300;
  font-size:clamp(4rem,12vw,8rem);
  letter-spacing:-0.03em;
  line-height:0.9;
  color:var(--text);
  position:relative;
}
.home-logo em{
  font-style:italic;
  color:var(--gold);
}
.home-logo-sub{
  font-family:var(--font-mono);
  font-size:0.65rem;
  letter-spacing:0.3em;
  text-transform:uppercase;
  color:var(--text3);
  margin-top:1rem;
}
.home-logo-line{
  width:80px;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  margin:0.75rem auto;
}

/* ── HOME SEARCH ── */
.home-search-wrap{
  width:100%;max-width:660px;
  animation:rise 0.9s 0.1s cubic-bezier(.16,1,.3,1) both;
  position:relative;z-index:2;
}
.search-field{
  display:flex;align-items:center;
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:50px;
  padding:0 1.25rem;
  gap:0.75rem;
  transition:border-color .2s,box-shadow .2s;
  box-shadow:0 4px 40px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,0.04);
}
.search-field:focus-within{
  border-color:var(--gold);
  box-shadow:0 0 0 3px rgba(200,169,110,0.12),0 4px 40px rgba(0,0,0,.5);
}
.search-field input{
  flex:1;border:none;outline:none;
  background:transparent;
  font-family:var(--font-ui);
  font-size:1.05rem;font-weight:400;
  color:var(--text);
  padding:1.1rem 0;
  caret-color:var(--gold);
}
.search-field input::placeholder{color:var(--text3)}
.ico-btn{
  background:none;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--text3);padding:4px;border-radius:50%;
  transition:color .15s,background .15s;
  flex-shrink:0;
}
.ico-btn:hover{color:var(--text);background:var(--surface2)}
.search-go{
  background:var(--gold);color:var(--bg);
  border:none;border-radius:50px;
  font-family:var(--font-ui);font-size:0.85rem;font-weight:600;
  padding:0.65rem 1.5rem;cursor:pointer;flex-shrink:0;
  transition:background .15s,transform .1s;
  letter-spacing:0.04em;
}
.search-go:hover{background:var(--gold2)}
.search-go:active{transform:scale(0.97)}

/* Suggestions */
.suggestions-drop{
  position:absolute;top:calc(100% + 6px);left:0;right:0;
  background:var(--surface);
  border:1px solid var(--border2);border-radius:var(--radius);
  overflow:hidden;display:none;
  box-shadow:0 16px 60px rgba(0,0,0,.6);
  z-index:100;
}
.suggestions-drop.open{display:block}
.sug-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 1.25rem;cursor:pointer;
  font-size:0.9rem;color:var(--text2);
  transition:background .1s;
}
.sug-item:hover{background:var(--surface2);color:var(--text)}
.sug-item svg{color:var(--text3);flex-shrink:0}

.home-hint{
  margin-top:1.5rem;
  font-size:0.75rem;letter-spacing:0.06em;
  color:var(--text3);
  animation:rise 0.9s 0.2s cubic-bezier(.16,1,.3,1) both;
  text-align:center;
}
.home-hint span{color:var(--gold);font-weight:500}

/* ══════════════════════════════════
   RESULTS PAGE
══════════════════════════════════ */
#page-results{display:none;flex-direction:column;min-height:100vh}
#page-results.active{display:flex}

/* Header */
.r-header{
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  padding:0.85rem 2rem;
  display:flex;align-items:center;gap:1.25rem;
  position:sticky;top:0;z-index:50;
  box-shadow:0 2px 20px rgba(0,0,0,.4);
  backdrop-filter:blur(12px);
}
.r-logo{
  font-family:var(--font-serif);font-weight:300;
  font-size:1.8rem;letter-spacing:-0.02em;
  color:var(--text);cursor:pointer;flex-shrink:0;
  user-select:none;white-space:nowrap;
}
.r-logo em{color:var(--gold);font-style:italic}

.r-search-field{
  display:flex;align-items:center;flex:1;max-width:640px;
  background:var(--surface);border:1px solid var(--border2);
  border-radius:50px;padding:0 1rem;gap:0.5rem;
  transition:border-color .2s,box-shadow .2s;
}
.r-search-field:focus-within{
  border-color:var(--gold);
  box-shadow:0 0 0 2px rgba(200,169,110,0.10);
}
.r-search-field input{
  flex:1;border:none;outline:none;background:transparent;
  font-family:var(--font-ui);font-size:0.95rem;color:var(--text);
  padding:0.7rem 0;caret-color:var(--gold);
}
.r-search-field input::placeholder{color:var(--text3)}
.r-go{
  background:var(--gold);color:var(--bg);border:none;border-radius:50px;
  font-family:var(--font-ui);font-size:0.78rem;font-weight:600;
  padding:0.5rem 1.2rem;cursor:pointer;flex-shrink:0;
  transition:background .15s;letter-spacing:0.04em;
}
.r-go:hover{background:var(--gold2)}

/* Nav tabs */
.r-tabs{
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:0 2rem;display:flex;gap:0;overflow-x:auto;
}
.r-tab{
  font-size:0.8rem;font-weight:500;color:var(--text3);
  padding:0.65rem 1.1rem;cursor:pointer;
  border-bottom:2px solid transparent;
  transition:color .15s,border-color .15s;
  white-space:nowrap;display:flex;align-items:center;gap:5px;
  flex-shrink:0;
}
.r-tab:hover{color:var(--text2)}
.r-tab.active{color:var(--gold);border-bottom-color:var(--gold)}

/* Body layout */
.r-body{
  display:flex;gap:2.5rem;max-width:1160px;width:100%;
  margin:0 auto;padding:1.75rem 2rem 4rem;flex:1;
}
.r-main{flex:1;min-width:0}
.r-aside{width:290px;flex-shrink:0}

/* Result meta */
.r-meta{
  font-size:0.78rem;color:var(--text3);
  margin-bottom:1.5rem;display:flex;align-items:center;gap:8px;
}
.r-meta strong{color:var(--text2);font-weight:500}
.r-meta-sep{color:var(--border2)}

/* Result card */
.r-card{margin-bottom:1.75rem;animation:rise .35s ease both}
.r-card:nth-child(2){animation-delay:.06s}
.r-card:nth-child(3){animation-delay:.12s}
.r-card:nth-child(4){animation-delay:.18s}
.r-card:nth-child(5){animation-delay:.24s}

.r-card-top{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.r-favicon{
  width:18px;height:18px;border-radius:4px;
  background:var(--surface2);display:flex;align-items:center;
  justify-content:center;font-size:9px;font-weight:700;
  color:var(--gold);flex-shrink:0;letter-spacing:0;
  border:1px solid var(--border);
}
.r-url{
  font-size:0.78rem;color:var(--green);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  flex:1;text-decoration:none;
}
.r-url:hover{text-decoration:underline;}
.r-rank-badge{
  font-family:var(--font-mono);font-size:0.68rem;
  color:var(--text3);background:var(--surface);
  border:1px solid var(--border);border-radius:4px;
  padding:1px 6px;flex-shrink:0;
}
.r-title{
  font-family:var(--font-serif);font-size:1.25rem;
  font-weight:400;color:var(--link);cursor:pointer;
  line-height:1.25;margin-bottom:5px;
  transition:color .15s;display:block;text-decoration:none;
}
.r-title:hover{text-decoration:underline;}
.r-title:hover{color:var(--gold);text-decoration:underline}
.r-snippet{
  font-size:0.875rem;color:var(--text2);line-height:1.7;
  margin-bottom:8px;
}
.r-snippet mark{
  background:rgba(200,169,110,0.15);color:var(--gold2);
  border-radius:2px;padding:0 2px;font-weight:500;
}
.r-score-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.score-badge{
  font-family:var(--font-mono);font-size:0.68rem;
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:2px 9px;color:var(--text3);
  display:flex;align-items:center;gap:5px;
}
.score-bar-wrap{width:50px;height:2px;background:var(--surface2);border-radius:1px}
.score-bar-fill{height:100%;background:var(--gold);border-radius:1px}
.cat-badge{
  font-size:0.68rem;background:var(--gold-dim);color:var(--gold);
  border:1px solid rgba(200,169,110,0.2);border-radius:20px;padding:2px 9px;
}
.r-divider{border:none;border-top:1px solid var(--border);margin:1.75rem 0}

/* No results */
.no-results{
  text-align:center;padding:5rem 2rem;
  animation:rise .4s ease both;
}
.no-results h2{
  font-family:var(--font-serif);font-size:2rem;
  color:var(--text2);margin-bottom:0.5rem;font-weight:300;
}
.no-results p{color:var(--text3);font-size:0.9rem}

/* Loading */
.loading-wrap{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:4rem 2rem;gap:1rem;
}
.loader{
  width:32px;height:32px;border-radius:50%;
  border:2px solid var(--surface2);
  border-top-color:var(--gold);
  animation:spin 0.7s linear infinite;
}
.loading-wrap p{font-size:0.85rem;color:var(--text3)}

/* Pagination */
.pagination{
  display:flex;align-items:center;justify-content:center;
  gap:6px;margin-top:2rem;
}
.pg-btn{
  background:var(--surface);border:1px solid var(--border);
  color:var(--text2);border-radius:6px;padding:7px 14px;
  font-family:var(--font-ui);font-size:0.82rem;cursor:pointer;
  transition:all .15s;
}
.pg-btn:hover:not(:disabled){background:var(--surface2);border-color:var(--gold);color:var(--gold)}
.pg-btn.active{background:var(--gold);color:var(--bg);border-color:var(--gold);font-weight:600}
.pg-btn:disabled{opacity:0.35;cursor:default}

/* ── SIDEBAR ── */
.aside-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem;
}
.aside-card h3{
  font-family:var(--font-serif);font-size:1rem;font-weight:400;
  color:var(--text);margin-bottom:0.75rem;letter-spacing:0.02em;
}
.aside-stat{
  display:flex;justify-content:space-between;align-items:center;
  font-size:0.8rem;padding:6px 0;
  border-bottom:1px solid var(--border);color:var(--text2);
}
.aside-stat:last-child{border-bottom:none}
.aside-stat span:last-child{
  font-family:var(--font-mono);font-size:0.74rem;color:var(--gold);
}
.term-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.term-chip{
  font-size:0.72rem;font-family:var(--font-mono);
  background:var(--gold-dim);border:1px solid rgba(200,169,110,0.2);
  color:var(--gold);border-radius:20px;padding:2px 9px;
}
.aside-about{
  background:linear-gradient(135deg,var(--surface),var(--bg3));
  border:1px solid var(--border2);border-radius:var(--radius);padding:1.25rem;
}
.aside-about h3{
  font-family:var(--font-serif);font-weight:300;font-style:italic;
  font-size:1.05rem;color:var(--gold);margin-bottom:8px;
}
.aside-about p{font-size:0.78rem;color:var(--text3);line-height:1.7}
.aside-about code{
  font-family:var(--font-mono);font-size:0.72rem;
  color:var(--gold2);background:var(--gold-dim);
  padding:1px 5px;border-radius:3px;
}

/* Server status pill */
.status-pill{
  display:flex;align-items:center;gap:6px;
  font-size:0.72rem;font-family:var(--font-mono);
  padding:3px 10px;border-radius:20px;
  border:1px solid var(--border);background:var(--surface);
  color:var(--text3);flex-shrink:0;margin-left:auto;
}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--text3)}
.status-dot.online{background:var(--green);box-shadow:0 0 6px var(--green)}
.status-dot.offline{background:var(--red)}

/* ── ANALYTICS PANEL ── */
.analytics-wrap{
  max-width:1160px;width:100%;margin:0 auto;padding:2rem;
  animation:rise .4s ease both;
}
.analytics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:1.5rem}
.a-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:1.25rem;
}
.a-card-label{font-size:0.75rem;color:var(--text3);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:6px}
.a-card-val{font-family:var(--font-serif);font-size:2rem;font-weight:300;color:var(--gold)}
.a-card-sub{font-size:0.75rem;color:var(--text3);margin-top:2px}
.a-table{width:100%;border-collapse:collapse;font-size:0.82rem}
.a-table th{background:var(--surface);padding:8px 12px;text-align:left;font-weight:500;color:var(--text2);border-bottom:1px solid var(--border)}
.a-table td{padding:8px 12px;border-bottom:1px solid var(--border);color:var(--text2)}
.a-table tr:last-child td{border-bottom:none}

/* ── FOOTER ── */
footer{
  background:var(--bg2);border-top:1px solid var(--border);
  padding:1rem 2rem;font-size:0.75rem;color:var(--text3);
  display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.5rem;
}
footer strong{color:var(--gold);font-weight:500}

/* ANIMATIONS */
@keyframes rise{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}

/* RESPONSIVE */
@media(max-width:768px){
  .r-aside,.status-pill{display:none}
  .r-body{padding:1rem}
  .r-header{padding:.75rem 1rem;gap:.75rem}
  .r-logo{font-size:1.4rem}
}
</style>
</head>
<body>

<!-- ════════════════════════════════════
     HOME PAGE
════════════════════════════════════ -->
<div id="page-home">
  <div class="home-logo-wrap">
    <div class="home-logo">The <em>Explorer</em></div>
    <div class="home-logo-line"></div>
    <div class="home-logo-sub">Neural Search Engine · BM25 + Semantic Ranking</div>
  </div>

  <div class="home-search-wrap">
    <div class="search-field" id="home-field">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text3);flex-shrink:0">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="home-input" type="text" placeholder="Search anything…" autocomplete="off" spellcheck="false"/>
      <button class="ico-btn" id="home-clear-btn" style="display:none" onclick="clearHome()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
      <button class="search-go" onclick="runSearch()">Search</button>
    </div>
    <div class="suggestions-drop" id="home-sug"></div>
  </div>

  <div class="home-hint" id="home-hint">Loading engine…</div>
</div>

<!-- ════════════════════════════════════
     RESULTS PAGE
════════════════════════════════════ -->
<div id="page-results">
  <header class="r-header">
    <div class="r-logo" onclick="goHome()">The <em>Explorer</em></div>
    <div class="r-search-field">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text3);flex-shrink:0">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="r-input" type="text" autocomplete="off" spellcheck="false"/>
      <button class="r-go" onclick="runSearch()">Search</button>
    </div>
    <div class="status-pill" id="status-pill">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">checking…</span>
    </div>
  </header>

  <div class="r-tabs">
    <div class="r-tab active" onclick="switchTab('all',this)">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      All Results
    </div>
    <div class="r-tab" onclick="switchTab('analytics',this)">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
      Analytics
    </div>
    <div class="r-tab" onclick="switchTab('api',this)">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M8 3H5a2 2 0 0 0-2 2v3M21 8V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
      API
    </div>
  </div>

  <!-- ALL RESULTS TAB -->
  <div id="tab-all" class="r-body">
    <main class="r-main">
      <div id="r-meta" class="r-meta"></div>
      <div id="r-results"></div>
      <div id="r-pagination" class="pagination"></div>
    </main>
    <aside class="r-aside" id="r-aside"></aside>
  </div>

  <!-- ANALYTICS TAB -->
  <div id="tab-analytics" style="display:none">
    <div class="analytics-wrap" id="analytics-content">
      <div class="loading-wrap"><div class="loader"></div><p>Loading analytics…</p></div>
    </div>
  </div>

  <!-- API DOCS TAB -->
  <div id="tab-api" style="display:none">
    <div class="analytics-wrap">
      <h2 style="font-family:var(--font-serif);font-weight:300;font-size:2rem;margin-bottom:1.5rem;color:var(--text)">API Reference</h2>
      <div style="display:flex;flex-direction:column;gap:1rem" id="api-docs"></div>
    </div>
  </div>

  <footer>
    <span><strong>The Explorer</strong> — Neural Search Engine</span>
    <span>BM25 + Sentence Transformers + Reciprocal Rank Fusion</span>
  </footer>
</div>

<script>
// ════════════════════════════════════════════════════════
//  CONFIG
// ════════════════════════════════════════════════════════
const API = "https://uncut-platypus-carrousel.ngrok-free.dev";  // Change to your server URL
const apiFetch = (url, opts={}) => fetch(url, {

const FALLBACK_CORPUS = [
  {title:"Introduction to Machine Learning",url:"https://example.com/ml-intro",domain:"example.com",category:"AI/ML",body:"Machine learning is a subset of artificial intelligence that enables systems to automatically learn and improve from experience without being explicitly programmed. Supervised learning uses labelled training data. Unsupervised learning finds hidden patterns. Reinforcement learning trains agents via reward signals. Deep learning uses multilayer neural networks."},

const SW = new Set(['a','an','the','is','are','was','were','be','been','have','has','had','do','does','did','to','of','in','for','on','with','as','by','at','from','and','or','but','not','that','this','it','its','they','their']);
function tok(t){return t.toLowerCase().replace(/[^a-z0-9\s]/g,' ').split(/\s+/).filter(w=>w.length>2&&!SW.has(w))}
function tfVec(tokens){
  const f={};tokens.forEach(t=>f[t]=(f[t]||0)+1);
  const m=Math.max(...Object.values(f),1);
  const v={};Object.keys(f).forEach(t=>v[t]=Math.log(1+f[t]/m));return v;
}
const N=FALLBACK_CORPUS.length;
const df={};
FALLBACK_CORPUS.forEach(d=>{new Set(tok(d.title+' '+d.body)).forEach(t=>df[t]=(df[t]||0)+1)});
const idf={};Object.keys(df).forEach(t=>idf[t]=Math.log((N+1)/(df[t]+1))+1);
const dVecs=FALLBACK_CORPUS.map(d=>{
  const tf=tfVec(tok(d.title+' '+d.title+' '+d.body));
  const v={};Object.keys(tf).forEach(t=>{if(idf[t])v[t]=tf[t]*idf[t]});return v;
});
function cosine(a,b){
  let dot=0,ma=0,mb=0;
  const keys=new Set([...Object.keys(a),...Object.keys(b)]);
  keys.forEach(k=>{const av=a[k]||0,bv=b[k]||0;dot+=av*bv;ma+=av*av;mb+=bv*bv});
  return ma&&mb?dot/(Math.sqrt(ma)*Math.sqrt(mb)):0;
}
function fallbackSearch(q,page=1,pk=10){
  const qt=tok(q);const tf=tfVec(qt);const qv={};
  Object.keys(tf).forEach(t=>qv[t]=tf[t]*(idf[t]||Math.log(N+1)));
  const scored=FALLBACK_CORPUS.map((d,i)=>({d,s:cosine(qv,dVecs[i]),i}))
    .filter(x=>x.s>0).sort((a,b)=>b.s-a.s);
  const maxS=scored[0]?.s||1;
  const offset=(page-1)*pk;
  return{
    query:q,total:scored.length,latency:0,page,pages:Math.ceil(scored.length/pk),
    results:scored.slice(offset,offset+pk).map((x,r)=>({
      rank:offset+r+1,title:x.d.title,url:x.d.url,domain:x.d.domain,
      snippet:x.d.body.slice(0,200)+'…',bm25:x.s,neural:x.s,rrf:x.s/maxS,
      crawled:new Date().toISOString(),category:x.d.category,
    }))
  };
}

async function checkHealth(){
  try{
    const r=await apiFetch(`${API}/health`,{signal:AbortSignal.timeout(2000)});
    const d=await r.json();
    serverOnline=true;
    setStatus(true,`${d.docs_indexed} docs`);
    document.getElementById('home-hint').innerHTML=
      `<span>${d.docs_indexed}</span> documents indexed · <span>Neural + BM25</span> ranking · <span>Offline VSM</span> fallback`;
  }catch{
    serverOnline=false;
    setStatus(false,'offline — VSM mode');
    document.getElementById('home-hint').innerHTML=
      `Backend offline · Running <span>VSM fallback</span> · Start backend for full neural search`;
  }
}
function setStatus(online,txt){
  document.getElementById('status-dot').className='status-dot '+(online?'online':'offline');
  document.getElementById('status-text').textContent=txt;
}

// ════════════════════════════════════════════════════════
//  SEARCH
// ════════════════════════════════════════════════════════
async function runSearch(){
  const rq=document.getElementById('r-input').value.trim();
  const hq=document.getElementById('home-input').value.trim();
  // On results page, r-input takes priority; on home page, home-input takes priority
  const onResults=document.getElementById('page-results').classList.contains('active');
  const q=(onResults?rq:hq)||rq||hq;
  if(!q)return;

  // If query changed, reset page
  if(q!==currentQuery){currentQuery=q;currentPage=1}

  document.getElementById('home-sug').classList.remove('open');
  document.getElementById('page-home').style.display='none';
  document.getElementById('page-results').classList.add('active');
  document.getElementById('r-input').value=q;
  document.getElementById('home-input').value=q;

  switchTabById('tab-all');
  showLoading();

  try{
    let data;
    if(serverOnline){
      const res=await apiFetch(`${API}/search?q=${encodeURIComponent(q)}&page=${currentPage}`);
      data=await res.json();
    }else{
      await new Promise(r=>setTimeout(r,120));// simulate
      data=fallbackSearch(q,currentPage);
    }
    currentData=data;
    renderResults(data,q);
  }catch(e){
    currentData=fallbackSearch(q,currentPage);
    renderResults(currentData,q);
  }
  window.scrollTo(0,0);
}

function showLoading(){
  document.getElementById('r-meta').innerHTML='';
  document.getElementById('r-results').innerHTML=`<div class="loading-wrap"><div class="loader"></div><p>Searching…</p></div>`;
  document.getElementById('r-pagination').innerHTML='';
  document.getElementById('r-aside').innerHTML='';
}

// ════════════════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════════════════
function hl(text,terms){
  if(!terms.length)return text;
  const escaped=terms.map(t=>t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'));
  const re=new RegExp('\\b('+escaped.join('|')+')\\b','gi');
  return text.replace(re,'<mark>$1</mark>');
}

function renderResults(data,q){
  const qt=tok(q);
  const maxRRF=data.results[0]?.rrf||1;
  const t=data.latency?`${data.latency}ms`:(serverOnline?'<1ms':'VSM');

  // Meta bar
  document.getElementById('r-meta').innerHTML=
    `About <strong>${data.total.toLocaleString()}</strong> results
     <span class="r-meta-sep">·</span>
     ${t}
     ${!serverOnline?'<span class="r-meta-sep">·</span><span style="color:var(--gold)">VSM mode</span>':''}`;

  // Cards
  if(!data.results.length){
    document.getElementById('r-results').innerHTML=`<div class="no-results"><h2>No results found</h2><p>Try different keywords.</p></div>`;
    document.getElementById('r-aside').innerHTML='';
    document.getElementById('r-pagination').innerHTML='';
    return;
  }

  document.getElementById('r-results').innerHTML=data.results.map((r,i)=>{
    const pct=Math.round((r.rrf/maxRRF)*100);
    const init=(r.domain||'?')[0].toUpperCase();
    const titleH=hl(r.title,qt);
    const snipH=hl(r.snippet||'',qt);
    return`<div class="r-card">
      <div class="r-card-top">
        <div class="r-favicon">${init}</div>
        <a class="r-url" href="${r.url}" target="_blank" rel="noopener noreferrer">${r.domain} › ${r.url.replace(/https?:\/\/[^/]+/,'').slice(0,50)||'/'}</a>
        <div class="r-rank-badge">#${r.rank}</div>
      </div>
      <a class="r-title" href="${r.url}" target="_blank" rel="noopener noreferrer">${titleH}</a>
      <div class="r-snippet">${snipH}</div>
      <div class="r-score-row">
        <div class="score-badge">
          <div class="score-bar-wrap"><div class="score-bar-fill" style="width:${pct}%"></div></div>
          ${r.rrf.toFixed(5)}
        </div>
        ${r.category||r.domain?`<span class="cat-badge">${r.category||r.domain}</span>`:''}
        <span style="font-size:.7rem;color:var(--text3);font-family:var(--font-mono)">BM25:${r.bm25.toFixed(3)}</span>
        ${r.neural?`<span style="font-size:.7rem;color:var(--text3);font-family:var(--font-mono)">Neural:${r.neural.toFixed(3)}</span>`:''}
      </div>
    </div>${i<data.results.length-1?'<hr class="r-divider">':''}`;
  }).join('');

  // Sidebar
  const catMap={};
  data.results.forEach(r=>{const c=r.category||r.domain;catMap[c]=(catMap[c]||0)+1});
  document.getElementById('r-aside').innerHTML=`
    <div class="aside-card">
      <h3>Query analysis</h3>
      ${qt.length?`<div class="term-chips">${qt.slice(0,8).map(t=>`<span class="term-chip">${t}</span>`).join('')}</div>`:''}
      <div style="margin-top:10px">
        <div class="aside-stat"><span>Mode</span><span>${serverOnline?'Neural + BM25':'VSM fallback'}</span></div>
        <div class="aside-stat"><span>Results</span><span>${data.total}</span></div>
        <div class="aside-stat"><span>Time</span><span>${data.latency||'<1'}ms</span></div>
        <div class="aside-stat"><span>RRF top</span><span>${(data.results[0]?.rrf||0).toFixed(5)}</span></div>
        <div class="aside-stat"><span>Page</span><span>${data.page} / ${data.pages}</span></div>
      </div>
    </div>
    <div class="aside-card">
      <h3>Categories</h3>
      ${Object.entries(catMap).sort((a,b)=>b[1]-a[1]).map(([c,n])=>
        `<div class="aside-stat"><span>${c}</span><span>${n}</span></div>`).join('')}
    </div>
    <div class="aside-about">
      <h3>The Explorer</h3>
      <p>Two-stage retrieval: <code>BM25</code> lexical first-pass → <code>Sentence-Transformers</code> neural re-ranking → <code>RRF</code> score fusion.</p>
    </div>`;

  // Pagination
  renderPagination(data.page,data.pages);
}

function renderPagination(page,pages){
  if(pages<=1){document.getElementById('r-pagination').innerHTML='';return}
  const nums=[];
  for(let i=Math.max(1,page-2);i<=Math.min(pages,page+2);i++)nums.push(i);
  document.getElementById('r-pagination').innerHTML=
    `<button class="pg-btn" onclick="gotoPage(${page-1})" ${page<=1?'disabled':''}>← Prev</button>`+
    nums.map(n=>`<button class="pg-btn${n===page?' active':''}" onclick="gotoPage(${n})">${n}</button>`).join('')+
    `<button class="pg-btn" onclick="gotoPage(${page+1})" ${page>=pages?'disabled':''}>Next →</button>`;
}

async function gotoPage(p){currentPage=p;await runSearch()}

// ════════════════════════════════════════════════════════
//  SUGGESTIONS
// ════════════════════════════════════════════════════════
const VOCAB=Object.keys(df).sort((a,b)=>(df[b]||0)-(df[a]||0));
function getSugs(q){
  if(!q||q.length<2)return[];
  const words=q.toLowerCase().split(/\s+/);
  const last=words[words.length-1];
  if(!last)return[];
  const prefix=words.slice(0,-1).join(' ');
  return VOCAB.filter(t=>t.startsWith(last)&&t!==last).slice(0,5)
    .map(t=>prefix?prefix+' '+t:t);
}
async function showSugs(q){
  const el=document.getElementById('home-sug');
  let items=[];
  if(serverOnline){
    try{
      const r=await apiFetch(`${API}/suggest?q=${encodeURIComponent(q)}`);
      const d=await r.json();
      items=d.suggestions||[];
    }catch{}
  }
  if(!items.length)items=getSugs(q);
  if(!items.length||!q){el.classList.remove('open');return}
  el.innerHTML=items.map(s=>`<div class="sug-item" onclick="pickSug('${s}')">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>${s}</div>`).join('');
  el.classList.add('open');
}
function pickSug(v){
  document.getElementById('home-input').value=v;
  document.getElementById('home-sug').classList.remove('open');
  updateClear();runSearch();
}

  if(!serverOnline){
    el.innerHTML=`<div class="loading-wrap"><p style="color:var(--text3)">Analytics require backend connection.</p></div>`;return;
  }
  try{
    const r=await apiFetch(`${API}/stats`);const d=await r.json();
    el.innerHTML=`
      <h2 style="font-family:var(--font-serif);font-weight:300;font-size:2rem;margin-bottom:1.5rem;color:var(--text)">Analytics</h2>
      <div class="analytics-grid">
        <div class="a-card"><div class="a-card-label">Documents Indexed</div><div class="a-card-val">${d.documents}</div></div>
        <div class="a-card"><div class="a-card-label">Queries Served</div><div class="a-card-val">${d.queries_served}</div></div>
        <div class="a-card"><div class="a-card-label">Avg Latency</div><div class="a-card-val">${d.avg_latency_ms}<span style="font-size:1rem;color:var(--text3)">ms</span></div></div>
        <div class="a-card"><div class="a-card-label">Model</div><div class="a-card-val" style="font-size:1rem;margin-top:4px;color:var(--gold2)">${d.model}</div><div class="a-card-sub">dim: ${d.embed_dim}</div></div>
      </div>
      <div class="aside-card">
        <h3>Top Queries</h3>
        <table class="a-table"><thead><tr><th>#</th><th>Query</th><th>Count</th></tr></thead><tbody>
        ${d.top_queries.map((q,i)=>`<tr><td>${i+1}</td><td>${q.query}</td><td>${q.count}</td></tr>`).join('')}
        </tbody></table>
      </div>`;
  }catch{el.innerHTML=`<div class="loading-wrap"><p>Failed to load analytics.</p></div>`}
}

function renderAPIDocs(){
  const endpoints=[
    {method:'GET',path:'/search?q={query}&page={n}',desc:'Main search endpoint. Returns ranked results with BM25, neural, and RRF scores.',
     example:'GET /search?q=machine+learning&page=1'},
    {method:'POST',path:'/search',desc:'POST variant. Body: {query, page, top_k}',
     example:'{"query":"deep learning","page":1,"top_k":10}'},
    {method:'POST',path:'/index',desc:'Manually index a document.',
     example:'{"url":"https://…","title":"…","body":"…","snippet":"…"}'},
    {method:'POST',path:'/crawl',desc:'Start background web crawl from seed URLs.',
     example:'{"urls":["https://example.com"],"max_pages":20}'},
    {method:'GET',path:'/suggest?q={prefix}',desc:'Autocomplete suggestions from query history.',
     example:'GET /suggest?q=mach'},
    {method:'GET',path:'/stats',desc:'Engine statistics: doc count, query count, avg latency, top queries.',
     example:'GET /stats'},
    {method:'GET',path:'/health',desc:'Health check. Returns model name, doc count, FAISS status.',
     example:'GET /health'},
    {method:'DELETE',path:'/index',desc:'Clear all indexed documents.',
     example:'DELETE /index'},
  ];
  document.getElementById('api-docs').innerHTML=endpoints.map(e=>`
    <div class="aside-card">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <span style="font-family:var(--font-mono);font-size:0.72rem;padding:2px 8px;border-radius:4px;background:${
          e.method==='GET'?'rgba(92,187,140,0.15)':e.method==='POST'?'rgba(200,169,110,0.15)':'rgba(232,106,92,0.15)'
        };color:${
          e.method==='GET'?'var(--green)':e.method==='POST'?'var(--gold)':'var(--red)'
        }">${e.method}</span>
        <code style="font-family:var(--font-mono);font-size:0.82rem;color:var(--text)">${e.path}</code>
      </div>
      <p style="font-size:0.82rem;color:var(--text2);margin-bottom:8px">${e.desc}</p>
      <pre style="font-family:var(--font-mono);font-size:0.72rem;color:var(--text3);background:var(--bg3);padding:8px 10px;border-radius:6px;overflow-x:auto">${e.example}</pre>
    </div>`).join('');
}

// ════════════════════════════════════════════════════════
//  TAB SWITCHING
// ════════════════════════════════════════════════════════
function switchTab(name,btn){
  ['all','analytics','api'].forEach(t=>{
    document.getElementById('tab-'+t).style.display=t===name?'block':'none';
  });
  document.querySelectorAll('.r-tab').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  if(name==='analytics')loadAnalytics();
  if(name==='api')renderAPIDocs();
}
function switchTabById(id){
  ['tab-all','tab-analytics','tab-api'].forEach(t=>document.getElementById(t).style.display='none');
  document.getElementById(id).style.display='block';
  document.querySelectorAll('.r-tab').forEach((b,i)=>b.classList.toggle('active',i===0));
}

function goHome(){
  document.getElementById('page-home').style.display='flex';
  document.getElementById('page-results').classList.remove('active');
  document.getElementById('home-input').focus();
}
function clearHome(){
  document.getElementById('home-input').value='';
  document.getElementById('home-clear-btn').style.display='none';
  document.getElementById('home-sug').classList.remove('open');
}
function updateClear(){
  const v=document.getElementById('home-input').value;
  document.getElementById('home-clear-btn').style.display=v?'flex':'none';
}

// ════════════════════════════════════════════════════════
//  EVENT LISTENERS
// ════════════════════════════════════════════════════════
document.getElementById('home-input').addEventListener('input',e=>{
  updateClear();showSugs(e.target.value);
});
document.getElementById('home-input').addEventListener('keydown',e=>{
  if(e.key==='Enter')runSearch();
  if(e.key==='Escape')document.getElementById('home-sug').classList.remove('open');
});
document.getElementById('r-input').addEventListener('keydown',e=>{
  if(e.key==='Enter'){currentPage=1;runSearch()}
});
document.addEventListener('click',e=>{
  if(!e.target.closest('#home-field')&&!e.target.closest('#home-sug'))
    document.getElementById('home-sug').classList.remove('open');
});

checkHealth();
setInterval(checkHealth,30000); // re-check every 30s
